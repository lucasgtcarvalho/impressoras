version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: impressora-postgres
    environment:
      POSTGRES_DB: impressora
      POSTGRES_USER: impressora
      POSTGRES_PASSWORD: impressora123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U impressora"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: impressora-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.api
    container_name: impressora-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://impressora:impressora123@postgres:5432/impressora
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-impressora-2026
      JWT_REFRESH_SECRET: dev-jwt-refresh-impressora-2026
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../backend/src:/app/src
      - ../../backend/package.json:/app/package.json
    command: npm run start:dev

volumes:
  postgres_data:
