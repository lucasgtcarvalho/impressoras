version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: impressora-postgres
    environment:
      POSTGRES_DB: impressora
      POSTGRES_USER: impressora
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U impressora"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: impressora-redis
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: impressora-api
    env_file: ../../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: impressora-frontend
    env_file: ../../frontend/.env.local
    depends_on:
      - api
    restart: always

  nginx:
    image: nginx:alpine
    container_name: impressora-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    restart: always

volumes:
  postgres_data:
  redis_data:
